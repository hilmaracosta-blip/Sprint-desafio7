<div class="home-wrapper">

    <div class="text-center mb-4">
      <img src="/img/ford.png" alt="Ford Logo" class="img-fluid" style="max-height: 40px;">
    </div>
    
    <a routerLink="/home" class="menu-link">
  <i class="bi bi-house-door me-2"></i>Home
</a>
<a routerLink="/dashboard" class="menu-link">

</a>

      <h4 class="mt-3" style="color: #249d6b; font-weight: 500; font-size: 1.6rem;">
